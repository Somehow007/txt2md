version: 2
project_name: txt2md

before:
  hooks:
    - go mod tidy
    - go test ./... -v

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Somehow007/txt2md/cmd/txt2md/commands.version={{.Version}}
    binary: txt2md
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
      {{- if .Mips }}_{{ .Mips }}{{ end }}
      {{- if not (eq .Version "dev") }}_{{ .Version }}{{ end }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: Somehow007
    name: txt2md
  draft: false
  prerelease: auto
  header: |
    ## 🎉 txt2md {{.Version}} Release

    Automatic release of txt2md.

    ### Installation

    #### Homebrew (macOS/Linux)
    ```bash
    brew install user/tap/txt2md
    ```

    #### Manual Download
    Download the appropriate binary for your platform from the assets below.

    - **macOS (Apple Silicon)**: `txt2md_Darwin_arm64_{{ .Version }}.tar.gz`
    - **macOS (Intel)**: `txt2md_Darwin_x86_64_{{ .Version }}.tar.gz`
    - **Linux (x86_64)**: `txt2md_Linux_x86_64_{{ .Version }}.tar.gz`
    - **Linux (ARM64)**: `txt2md_Linux_arm64_{{ .Version }}.tar.gz`
    - **Windows (x86_64)**: `txt2md_Windows_x86_64_{{ .Version }}.zip`

    Extract and move to your PATH:
    ```bash
    tar -xzf txt2md_*.tar.gz
    chmod +x txt2md
    sudo mv txt2md /usr/local/bin/
    ```
