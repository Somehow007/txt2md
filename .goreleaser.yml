version: 2
project_name: txt2md

before:
  hooks:
    - go mod tidy
    - go test ./... -v

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Somehow007/txt2md/cmd/txt2md/commands.version={{.Version}}
    binary: txt2md
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
      {{- if .Mips }}_{{ .Mips }}{{ end }}
      {{- if not (eq .Version "dev") }}_{{ .Version }}{{ end }}
    files:
      - man/txt2md.1
      - completions/*

manpages:
  - man/txt2md.1

completions:
  bash:
    - txt2md
  zsh:
    - txt2md
  fish:
    - txt2md
  powershell:
    - txt2md

nfpms:
  - id: txt2md
    package_name: txt2md
    file_name_template: >-
      {{ .PackageName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
      {{- if .Mips }}_{{ .Mips }}{{ end }}
      {{- if not (eq .Version "dev") }}_{{ .Version }}{{ end }}
    builds:
      - txt2md
    homepage: https://github.com/Somehow007/txt2md
    maintainer: Somehow007
    description: Convert plain text to well-formatted Markdown
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    contents:
      - src: man/txt2md.1
        dst: /usr/share/man/man1/txt2md.1
        file_info:
          mode: 0644
      - src: completions/txt2md.bash
        dst: /usr/share/bash-completion/completions/txt2md
        file_info:
          mode: 0644
      - src: completions/txt2md.zsh
        dst: /usr/share/zsh/vendor-completions/_txt2md
        file_info:
          mode: 0644
      - src: completions/txt2md.fish
        dst: /usr/share/fish/vendor_completions.d/txt2md.fish
        file_info:
          mode: 0644

brews:
  - name: txt2md
    tap:
      owner: Somehow007
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    url_template: "https://github.com/Somehow007/txt2md/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: https://github.com/Somehow007/txt2md
    description: Convert plain text to well-formatted Markdown
    license: MIT
    install: |
      bin.install "txt2md"
      man1.install "man/txt2md.1"
      bash_completion.install "completions/txt2md.bash"
      zsh_completion.install "completions/txt2md.zsh" => "_txt2md"
      fish_completion.install "completions/txt2md.fish"
    test: |
      system "#{bin}/txt2md --version"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: Somehow007
    name: txt2md
  draft: false
  prerelease: auto
  header: |
    ## 🎉 txt2md {{.Version}} Release

    Automatic release of txt2md.

    ### Installation

    #### Homebrew (macOS/Linux)
    ```bash
    brew install Somehow007/tap/txt2md
    ```

    #### Manual Download
    Download the appropriate binary for your platform from the assets below.

    - **macOS (Apple Silicon)**: `txt2md_Darwin_arm64_{{ .Version }}.tar.gz`
    - **macOS (Intel)**: `txt2md_Darwin_x86_64_{{ .Version }}.tar.gz`
    - **Linux (x86_64)**: `txt2md_Linux_x86_64_{{ .Version }}.tar.gz`
    - **Linux (ARM64)**: `txt2md_Linux_arm64_{{ .Version }}.tar.gz`
    - **Windows (x86_64)**: `txt2md_Windows_x86_64_{{ .Version }}.zip`

    Extract and move to your PATH:
    ```bash
    tar -xzf txt2md_*.tar.gz
    chmod +x txt2md
    sudo mv txt2md /usr/local/bin/
    ```
